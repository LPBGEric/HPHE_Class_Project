<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>健康自然貪食蛇 - 伺服器數據版</title>
    <style>
        body { 
            margin: 0; background: #eef2f3; font-family: "Microsoft JhengHei", sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; 
            overflow: hidden; 
        }
        #app-box { 
            background: #fff; border: 5px solid #2e7d32; display: flex; 
            width: 95vw; max-width: 1000px; height: 85vh; position: relative; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-radius: 20px; overflow: hidden;
        }
        #info-panel { 
            flex: 0.8; padding: 25px; border-right: 2px solid #f0f0f0; 
            display: flex; flex-direction: column; justify-content: space-between;
            background: #fff; z-index: 5;
        }
        #q-title { font-size: 1.4rem; font-weight: 900; color: #1b5e20; margin-bottom: 15px; }
        .opt-row { margin: 8px 0; font-size: 1.1rem; font-weight: bold; display: flex; align-items: center; }
        .opt-label { width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; margin-right: 12px; font-size: 0.9rem; flex-shrink: 0; }
        
        #feedback-area { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; animation: fadeIn 0.3s; }
        .feedback-correct { background: #e8f5e9; border-left: 5px solid #2e7d32; color: #1b5e20; }
        .feedback-wrong { background: #ffebee; border-left: 5px solid #d32f2f; color: #b71c1c; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-area { display: flex; gap: 10px; }
        .btn-side { flex: 1; padding: 12px 5px; border-radius: 10px; cursor: pointer; font-weight: bold; text-align: center; border: 1px solid #ccc; background: #fff;}
        
        #game-panel { flex: 1.2; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; position: relative; }
        canvas { background: #fff; border: 4px solid #2e7d32; border-radius: 10px; }
        .status { width: 480px; display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.2rem; font-weight: 900; }
        
        #ui-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; color: #2e7d32; background: rgba(255,255,255,0.8); width: 100%; height: 100%; display: none; align-items: center; justify-content: center; z-index: 20; }

        .full-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn-main { padding: 12px 35px; font-size: 1.3rem; cursor: pointer; border: none; border-radius: 50px; font-weight: bold; color: white; margin: 10px; transition: 0.2s; }
        .btn-main:disabled { background: #ccc !important; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="app-box">
    <div id="scr-start" class="full-screen">
        <h1 style="color: #2e7d32; font-size: 2.5rem;">🐍 20x20 健康冒險</h1>
        <p id="load-status">正在從伺服器載入題目...</p>

        <div class="btn-group">
            <button id="b-easy" class="btn-main" style="background:#4caf50" onclick="gameInit(200)" disabled>簡單</button>
            <button id="b-med" class="btn-main" style="background:#ff9800" onclick="gameInit(150)" disabled>中等</button>
            <button id="b-hard" class="btn-main" style="background:#f44336" onclick="gameInit(100)" disabled>困難</button>
        </div>
        <p style="font-size: 0.9rem; color: #666;">[Space] 暫停 | ❤️ 恢復體力</p>
    </div>

    <div id="info-panel">
        <div>
            <div id="q-title">載入中...</div>
            <div id="opt-list"></div>
            <div id="feedback-area">
                <b id="fb-status"></b><br>
                <span id="fb-note"></span>
            </div>
        </div>
        <div class="btn-area">
            <div class="btn-side" onclick="togglePause()">⏸️ 暫停</div>
            <div class="btn-side" onclick="location.reload()">🔄 重啟</div>
        </div>
    </div>

    <div id="game-panel">
        <div id="ui-overlay">3</div>
        <div class="status">
            <span id="ui-hearts" style="color: #ff1744;">❤️❤️❤️</span>
            <span style="color:#2e7d32">得分: <span id="ui-score">0</span></span>
        </div>
        <canvas id="cvs" width="480" height="480"></canvas>
    </div>

    <div id="scr-end" class="full-screen" style="display:none">
        <h1 id="end-msg">遊戲結束</h1>
        <div id="final-pts" style="font-size: 4rem; font-weight: 900; color: #2e7d32;">0</div>
        <button class="btn-main" style="background:#2e7d32" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
let POOL = []; 
let curIdx=0, score=0, lives=3, loop=null, gameSpeed=150;
let snake=[], dir={x:0, y:-1}, nextD={x:0, y:-1};
let targets=[], heartBonus=null, isPaused = false, inCountdown = false, isSafe = false, isProcessing = false;
let curSnakeLen = 3;

const canvas=document.getElementById('cvs'), ctx=canvas.getContext('2d');
const sz=24, grid=20; 

// 1. Fetch data.csv from server on load
window.onload = () => {
    fetch('data.csv')
        .then(response => {
            if (!response.ok) throw new Error("找不到 data.csv 檔案");
            return response.text();
        })
        .then(text => {
            parseCSV(text);
            document.getElementById('load-status').innerText = "題目載入成功！請選擇難度：";
            document.querySelectorAll('.btn-main').forEach(b => b.disabled = false);
        })
        .catch(err => {
            document.getElementById('load-status').innerText = "錯誤: " + err.message;
            document.getElementById('load-status').style.color = "red";
        });
};

function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    POOL = lines.filter(line => line.trim() !== "").map(line => {
        const p = line.split(',');
        // Expected: q, a1, a2, a3, a4, correctAnswer
        return {
            q: p[0],
            a: [p[1], p[2], p[3], p[4]],
            ok: p[5]?.trim().toUpperCase() || "A"
        };
    });
}

function gameInit(speed) {
    gameSpeed = speed; isPaused = false; isProcessing = false;
    document.getElementById('scr-start').style.display = 'none';
    document.getElementById('scr-end').style.display = 'none';
    curIdx=0; score=0; lives=3; curSnakeLen = 3;
    loadLevel();
}

function loadLevel() {
    if(curIdx >= POOL.length) return gameOver(true);
    updateUI();
    document.getElementById('feedback-area').style.display = 'none';
    
    const data = POOL[curIdx];
    document.getElementById('q-title').innerText = (curIdx+1) + ". " + data.q;
    document.getElementById('opt-list').innerHTML = data.a.map((txt, i) => `
        <div class="opt-row">
            <span class="opt-label" style="background:${["#d32f2f", "#1976d2", "#f57c00", "#7b1fa2"][i]}">${String.fromCharCode(65+i)}</span>
            ${txt}
        </div>`).join('');
    
    spawnItems();
    resetSnakePosition();
    draw();
    startCountdown();
}

function startCountdown() {
    inCountdown = true;
    let count = 3;
    const overlay = document.getElementById('ui-overlay');
    overlay.style.display = 'flex';
    overlay.innerText = count;
    const timer = setInterval(() => {
        count--;
        if (count > 0) overlay.innerText = count;
        else {
            clearInterval(timer);
            overlay.style.display = 'none';
            inCountdown = false;
            if(loop) clearInterval(loop);
            loop = setInterval(gameStep, gameSpeed);
        }
    }, 800);
}

function resetSnakePosition() {
    snake = [];
    for(let i=0; i<curSnakeLen; i++) snake.push({x: 10, y: 12 + i});
    dir = {x:0, y:-1}; nextD = {x:0, y:-1};
}

function spawnItems() {
    targets = [];
    const colors = ["#d32f2f", "#1976d2", "#f57c00", "#7b1fa2"];
    for(let i=0; i<4; i++) {
        let p;
        do { p = {x:Math.floor(Math.random()*grid), y:Math.floor(Math.random()*grid)};
        } while(snake.some(s=>s.x==p.x && s.y==p.y) || targets.some(t=>t.x==p.x && t.y==p.y));
        targets.push({x:p.x, y:p.y, char:String.fromCharCode(65+i), color:colors[i]});
    }
    // Random chance for heart each level
    heartBonus = (Math.random() > 0.4) ? {x: Math.floor(Math.random()*grid), y: Math.floor(Math.random()*grid)} : null;
}

function gameStep() {
    if(isPaused || inCountdown) return;
    dir = nextD;
    let head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
    
    // Wall/Self Collision
    if(head.x<0 || head.x>=grid || head.y<0 || head.y>=grid || (!isSafe && snake.some(s=>s.x==head.x && s.y==head.y))) {
        lives--; updateUI();
        if(lives <= 0) return gameOver(false);
        clearInterval(loop);
        resetSnakePosition();
        startCountdown();
        return;
    }

    // Recover Heart
    if(heartBonus && head.x==heartBonus.x && head.y==heartBonus.y) {
        if(lives < 5) lives++; heartBonus=null; updateUI();
    }

    // Hit Answer
    let tIdx = targets.findIndex(t => t.x==head.x && t.y==head.y);
    if(tIdx !== -1 && !isProcessing) handleAnswer(targets[tIdx].char === POOL[curIdx].ok);

    snake.unshift(head);
    if(snake.length > curSnakeLen) snake.pop(); 
    draw();
}

function handleAnswer(isCorrect) {
    isProcessing = true;
    targets = []; 
    if(isCorrect) { score += 10; curSnakeLen++; } else { score -= 10; }
    
    const fbArea = document.getElementById('feedback-area');
    document.getElementById('fb-status').innerText = isCorrect ? "✅ 答對了！" : "❌ 答錯了！";
    fbArea.className = isCorrect ? "feedback-correct" : "feedback-wrong";
    fbArea.style.display = 'block';
    updateUI();

    isSafe = true; // Temporary invincibility while moving
    curIdx++;
    setTimeout(() => {
        isProcessing = false; isSafe = false;
        loadLevel();
    }, 2000);
}

function draw() {
    ctx.clearRect(0,0,480,480);
    ctx.strokeStyle = "#f0f0f0";
    for(let i=0; i<=grid; i++){ ctx.beginPath(); ctx.moveTo(i*sz,0); ctx.lineTo(i*sz,480); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i*sz); ctx.lineTo(480,i*sz); ctx.stroke(); }
    
    if(heartBonus){ ctx.font="20px Arial"; ctx.textAlign="center"; ctx.fillText("❤️", heartBonus.x*sz+sz/2, heartBonus.y*sz+sz/1.2); }
    
    targets.forEach(t => { 
        ctx.fillStyle = t.color; ctx.beginPath(); ctx.arc(t.x*sz+sz/2, t.y*sz+sz/2, sz/2.2, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = "#fff"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.fillText(t.char, t.x*sz+sz/2, t.y*sz+sz/1.4); 
    });
    
    snake.forEach((s, i) => { 
        ctx.fillStyle = (i === 0) ? "#1b5e20" : (i%2==0 ? "#4caf50":"#81c784"); 
        if(isSafe) ctx.globalAlpha = 0.5; 
        ctx.beginPath(); ctx.arc(s.x*sz+sz/2, s.y*sz+sz/2, sz/2.1, 0, Math.PI*2); ctx.fill(); 
        ctx.globalAlpha = 1.0; 
    });
}

function togglePause() {
    if(inCountdown) return;
    const overlay = document.getElementById('ui-overlay');
    if(isPaused) { 
        loop = setInterval(gameStep, gameSpeed); isPaused=false; overlay.style.display='none'; 
    } else { 
        clearInterval(loop); isPaused=true; overlay.style.display='flex'; overlay.innerText = "已暫停"; 
    }
}

function updateUI() {
    document.getElementById('ui-hearts').innerText = "❤️".repeat(lives) + "🖤".repeat(Math.max(0, 5-lives));
    document.getElementById('ui-score').innerText = score;
}

function gameOver(win) {
    clearInterval(loop);
    document.getElementById('scr-end').style.display = 'flex';
    document.getElementById('end-msg').innerText = win ? "🏆 挑戰成功！" : "💀 體力耗盡！";
    document.getElementById('final-pts').innerText = score;
}

window.onkeydown = e => {
    if(e.code === "Space") { e.preventDefault(); togglePause(); }
    const keys = {"ArrowUp":{x:0,y:-1},"ArrowDown":{x:0,y:1},"ArrowLeft":{x:-1,y:0},"ArrowRight":{x:1,y:0}};
    if(keys[e.key]) { e.preventDefault(); if(keys[e.key].x !== -dir.x || keys[e.key].y !== -dir.y) nextD = keys[e.key]; }
};
</script>
</body>
</html>
